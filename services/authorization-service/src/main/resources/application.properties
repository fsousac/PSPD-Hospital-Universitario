# Authorization Service — configuração
# Nomes de propriedade seguem a convenção Quarkus/SmallRye Config: qualquer
# propriedade abaixo pode ser sobrescrita por variável de ambiente
# (ex.: quarkus.datasource.jdbc.url -> QUARKUS_DATASOURCE_JDBC_URL), como já
# feito pelo docker-compose.yml na raiz do repositório.

quarkus.application.name=authorization-service

# gRPC compartilha a porta HTTP (8080), única porta exposta no docker-compose.
quarkus.grpc.server.use-separate-server=false

# ---- Datasource (PostgreSQL) ----
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.schema-management.strategy=none

# Agroal pool explícito (default min-size=0/max-size=20): min-size=2 evita
# cold-start de conexão na primeira rajada; max-size=8 respeita o
# max_connections=500 do Postgres compartilhado entre 10 grupos (ver docs/decisions/0005).
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=8

%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/hu_db
%dev.quarkus.datasource.username=hu_user
%dev.quarkus.datasource.password=hu_password

%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://postgres:5432/hu_db}
%prod.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:hu_user}
%prod.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:hu_password}

# ---- Validação manual do jwt_token (MicroProfile JWT / smallrye-jwt) ----
# Sem extensão quarkus-oidc (removida, nunca usada — ver docs/decisions/0005);
# QUARKUS_OIDC_AUTH_SERVER_URL aqui é só o endereço do Keycloak reaproveitado.
%dev.mp.jwt.verify.publickey.location=${QUARKUS_OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/hu}/protocol/openid-connect/certs
%dev.mp.jwt.verify.issuer=${QUARKUS_OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/hu}
%prod.mp.jwt.verify.publickey.location=${QUARKUS_OIDC_AUTH_SERVER_URL:http://keycloak:8180/realms/hu}/protocol/openid-connect/certs
%prod.mp.jwt.verify.issuer=${MP_JWT_VERIFY_ISSUER:${QUARKUS_OIDC_AUTH_SERVER_URL:http://keycloak:8180/realms/hu}}

%test.mp.jwt.verify.publickey.location=publicKey.pem
%test.mp.jwt.verify.issuer=https://issuer.test/realms/hu
%test.smallrye.jwt.sign.key.location=privateKey.pem

# ---- Testes ----
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.sql-load-script=import.sql
