apiVersion: apps/v1
kind: Deployment
metadata:
  name: hu-frontend
  namespace: hu-observability
  labels:
    app.kubernetes.io/name: hu-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: hu-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hu-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hu-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: hu-observability
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: frontend
          image: hu-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: hu-frontend-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

