# O api-gateway atende só /grupo10/api/*, /healthz, /readyz e /metrics — o
# resto de /grupo10 (raiz, assets, rotas do SPA) é do frontend
# (k8s/frontend-ingress.yaml). As duas Ingress compartilham o mesmo host
# (kiriland.unb.br) então o path aqui precisa ser mais específico que o do
# frontend (catch-all) para o nginx-ingress priorizar corretamente — por
# isso a annotation de priority abaixo, além do path já ser mais restrito.
#
# Ajuste confirmado pela dica de uso do cluster: o Ingress precisa declarar
# host kiriland.unb.br, path regex /grupoXX/... com pathType
# ImplementationSpecific, e apontar para a porta 80 do Service do gateway.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hu-gateway-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/priority: "10"
spec:
  ingressClassName: nginx
  rules:
    - host: kiriland.unb.br
      http:
        paths:
          # Só os paths reais do gateway (ver services/api-gateway/internal/gateway/router.go):
          # /api/v1/... (negócio), /healthz, /readyz, /metrics. Tudo mais em
          # /grupo10 (raiz, assets, rotas do SPA) cai no frontend.
          - path: /grupo10(/|$)(api/.*|healthz|readyz|metrics)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
