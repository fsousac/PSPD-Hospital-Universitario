apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-transform-service
  labels:
    app: data-transform-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-transform-service
  template:
    metadata:
      labels:
        app: data-transform-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: data-transform-service
          # ghcr.io/fsousac (GitHub Container Registry, pacote público) —
          # build local + push manual até haver CI (ver docs/decisions/0005).
          image: ghcr.io/fsousac/hu-data-transform-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50053
              name: grpc
            - containerPort: 8083
              name: health
          env:
            - name: GRPC_PORT
              value: "50053"
            - name: HEALTH_PORT
              value: "8083"
            - name: PATIENT_DATA_SERVICE_URL
              value: "patient-data-service:50052"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          # src/health.py só expõe /health (sem distinção live/ready) —
          # usar o mesmo endpoint para as duas probes é aceitável.
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: data-transform-service
  labels:
    app: data-transform-service
spec:
  selector:
    app: data-transform-service
  ports:
    - name: grpc
      port: 50053
      targetPort: 50053
    - name: metrics
      port: 8083
      targetPort: 8083
