apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-data-service
  labels:
    app: patient-data-service
spec:
  # 3 réplicas: já validado sob carga (kubectl scale manual) sem regressão de
  # cota (ver docs/decisions/0005). Declarado aqui pra não se perder no
  # próximo `kubectl apply -k`.
  replicas: 3
  selector:
    matchLabels:
      app: patient-data-service
  template:
    metadata:
      labels:
        app: patient-data-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: patient-data-service
          # ghcr.io/fsousac (GitHub Container Registry, pacote público) —
          # build local + push manual até haver CI (ver docs/decisions/0005).
          image: ghcr.io/fsousac/hu-patient-data-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50052
              name: grpc
            - containerPort: 8082
              name: health
          env:
            - name: GRPC_PORT
              value: "50052"
            - name: HEALTH_PORT
              value: "8082"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hu-db-credentials
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          # src/health.py só expõe /health (sem distinção live/ready) —
          # usar o mesmo endpoint para as duas probes é aceitável.
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: patient-data-service
  labels:
    app: patient-data-service
spec:
  # headless (sem ClusterIP): o client gRPC (api-gateway e
  # data-transform-service) abre uma única conexão HTTP/2 de longa duração e
  # a reaproveita — com ClusterIP normal, o DNS resolve pra 1 IP virtual só e
  # o round_robin client-side não tem múltiplos IPs pra balancear entre
  # réplicas. Ver docs/decisions/0005.
  clusterIP: None
  selector:
    app: patient-data-service
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
    - name: metrics
      port: 8082
      targetPort: 8082
