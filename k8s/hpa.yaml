# Fora da lista `resources` do kustomization.yaml de propósito: aplicar HPA
# desde o início competiria com o scale manual das fases (a)-(c) da
# metodologia (o HPA reverteria `kubectl scale --replicas=3` para o valor que
# ele calcular). Só aplicar na fase (d) (autoscaling):
#   kubectl apply -f k8s/hpa.yaml -n grupo-10
#
# Depende de metrics-server estar instalado no cluster (`kubectl top nodes`
# funcionando) — ver docs/decisions/0005, seção Riscos.
#
# minReplicas: 1 nos 4 — de propósito, para economizar recursos ociosos na
# ResourceQuota compartilhada do namespace (`cota-grupo`: 3 cores request/6
# cores limit). Uma tentativa anterior de fixar minReplicas alto (2-3) por
# serviço para evitar cold-start entre execuções de teste foi revertida: o
# problema real era a forma da carga do k6 (degrau instantâneo 0→N VUs), não
# o piso de réplicas.
#
# behavior.scaleUp abaixo é mais agressivo que o default do k8s (que só
# dobra a contagem de réplicas a cada 15s): permite ir direto a até 400% da
# contagem atual (ou +8 pods, o que for maior) por ciclo de 15s, sem janela
# de estabilização. Medido ao vivo: mesmo com rampa gradual no k6
# (`RAMP_UP_SECONDS`), patient-data-service precisou de ~3 ciclos de reconciliação
# (1→2→3 réplicas, CPU chegando a 197%/70% no meio do caminho) pra convergir
# sob carga real — o default (dobrar por ciclo) é conservador demais pra
# convergir dentro da janela de rampa de um teste de carga curto. Ver
# docs/decisions/0005.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: grupo-10
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 1
  maxReplicas: 10
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 400
          periodSeconds: 15
        - type: Pods
          value: 8
          periodSeconds: 15
      selectPolicy: Max
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
