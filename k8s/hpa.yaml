# Fora da lista `resources` do kustomization.yaml de propósito: aplicar HPA
# desde o início competiria com o scale manual das fases (a)-(c) da
# metodologia (o HPA reverteria `kubectl scale --replicas=3` para o valor que
# ele calcular). Só aplicar na fase (d) (autoscaling):
#   kubectl apply -f k8s/hpa.yaml -n grupo-10
#
# Depende de metrics-server estar instalado no cluster (`kubectl top nodes`
# funcionando) — ver docs/decisions/0005, seção Riscos.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: grupo-10
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: authorization-service
  namespace: grupo-10
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: authorization-service
  # min 2 (não 1, diferente dos outros 3 HPAs): authorization-service é JVM
  # (Quarkus), com startupProbe permitindo até 60s pra ficar pronto — bem
  # mais que a duração de um cenário de teste (1-2min). Com min:1, depois de
  # qualquer período ocioso (janela de estabilização do HPA) ele volta pra 1
  # réplica; a próxima rajada de carga dispara o scale-up, mas as réplicas
  # novas não ficam prontas a tempo, e a única réplica original absorve 100%
  # da carga sozinha — reproduzindo o mesmo gargalo de /patients/{id} sob
  # carga já achado e corrigido manualmente na fase (c) (ver
  # k8s/authorization-service.yaml). min:2 garante o baseline morno o tempo
  # todo, sem abrir mão do autoscaling até 10 sob carga real sustentada.
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
