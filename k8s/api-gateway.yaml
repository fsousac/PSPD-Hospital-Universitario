apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-gateway
          # ghcr.io/fsousac (GitHub Container Registry, pacote público) —
          # build local + push manual até haver CI (ver docs/decisions/0005).
          image: ghcr.io/fsousac/hu-api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: hu-config
          env:
            - name: GATEWAY_LISTEN_ADDR
              value: ":8000"
            - name: COHORT_PSEUDONYM_KEY
              valueFrom:
                secretKeyRef:
                  name: hu-db-credentials
                  key: COHORT_PSEUDONYM_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    # Porta 80 exigida pela convenção de roteamento do Apache do professor
    # (https://kiriland.unb.br/grupoX -> Service "api-gateway" na porta 80,
    # ver orientacoes_sobre_clusterK8S.pdf, Figura 2). O Ingress nginx
    # continua usando a 8000 internamente; isso só existe pro path externo.
    - name: http-external
      port: 80
      targetPort: 8000
