apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorization-service
  labels:
    app: authorization-service
spec:
  # 2 réplicas: toda chamada GetPatient/AggregateResearch faz uma decisão de
  # autorização com round-trip ao Postgres (ver AuthorizationDecisionService);
  # com 1 réplica só, virou o gargalo de /patients/{id} sob 50 VUs mesmo após
  # escalar gateway/patient-data-service (docs/decisions/0005, fase b/c). 2 (e
  # não 3) porque é JVM com footprint de memória maior que os outros serviços.
  replicas: 2
  selector:
    matchLabels:
      app: authorization-service
  template:
    metadata:
      labels:
        app: authorization-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/q/metrics"
    spec:
      containers:
        - name: authorization-service
          # ghcr.io/fsousac (GitHub Container Registry, pacote público) —
          # build local + push manual até haver CI (ver docs/decisions/0005).
          image: ghcr.io/fsousac/hu-authorization-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http-grpc
          envFrom:
            - configMapRef:
                name: hu-config
            - secretRef:
                name: hu-db-credentials
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            # limit de CPU subido de 500m para 1000m (2026-07-13): sob 500m,
            # o boot da JVM (class-loading + JIT + Hibernate ORM Panache +
            # gRPC server) sofre CPU throttling real e pode facilmente
            # estourar os 60s do startupProbe sob carga — foi a causa
            # provável do colapso repetido em 50 VUs mesmo depois dos fixes
            # de rampa/HPA já aplicados (ver docs/decisions/0005). Request
            # não mudou: só afeta o teto de burst durante o boot, não o
            # custo ocioso da ResourceQuota compartilhada.
            limits:
              cpu: "1000m"
              memory: "512Mi"
          # JVM (não-native) demora mais a subir que os outros serviços —
          # startupProbe evita que liveness/readiness matem o pod antes do
          # boot terminar, sem precisar inflar initialDelaySeconds das duas.
          startupProbe:
            httpGet:
              path: /q/health/started
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: authorization-service
  labels:
    app: authorization-service
spec:
  # headless: mesma razão do patient-data-service (ver comentário lá e
  # docs/decisions/0005) — o api-gateway mantém uma conexão gRPC persistente.
  clusterIP: None
  selector:
    app: authorization-service
  ports:
    - name: http-grpc
      port: 8080
      targetPort: 8080
