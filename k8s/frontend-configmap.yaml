apiVersion: v1
kind: ConfigMap
metadata:
  name: hu-frontend-config
  labels:
    app.kubernetes.io/name: hu-frontend
    app.kubernetes.io/part-of: hu-observability
data:
  # ATENÇÃO: o Vite embute VITE_* no bundle estático em build time (ver
  # frontend/Dockerfile) — esses valores NÃO afetam o container em runtime,
  # servem só de documentação/referência do que precisa ir nos --build-arg
  # da imagem publicada (ver k8s/README.md). Se o valor aqui não bate com o
  # que foi usado no build da imagem em uso, é a imagem que está errada.
  VITE_API_BASE_URL: ""
  VITE_AUTH_MODE: "keycloak"
  VITE_ENABLE_MOCKS: "false"
  VITE_KEYCLOAK_URL: "https://kiriland.unb.br/keycloak"
  VITE_KEYCLOAK_REALM: "grupo10"
  VITE_KEYCLOAK_CLIENT_ID: "hu-frontend"
  VITE_BASE_PATH: "/grupo10/"

