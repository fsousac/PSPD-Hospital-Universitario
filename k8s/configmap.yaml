apiVersion: v1
kind: ConfigMap
metadata:
  name: hu-config
data:
  # Endereços internos dos serviços via DNS do namespace (ver Service em
  # cada manifest — nome do Service = host, sem sufixo .svc.cluster.local
  # porque tudo está no mesmo namespace).
  AUTH_SERVICE_ADDR: "authorization-service:8080"
  PATIENT_DATA_SERVICE_ADDR: "patient-data-service:50052"
  DATA_TRANSFORM_SERVICE_ADDR: "data-transform-service:50053"

  # Keycloak do cluster compartilhado, realm do grupo 10.
  OIDC_ISSUER_URL: "https://kiriland.unb.br/keycloak/realms/grupo10"
  QUARKUS_OIDC_AUTH_SERVER_URL: "https://kiriland.unb.br/keycloak/realms/grupo10"
  QUARKUS_OIDC_CLIENT_ID: "authorization-service"

  # Rate limit do api-gateway (mesmos valores do docker-compose local).
  RATE_LIMIT_RPS: "500"
  RATE_LIMIT_BURST: "1000"
