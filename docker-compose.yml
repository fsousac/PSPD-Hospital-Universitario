version: "3.9"

# Sobe apenas Keycloak + PostgreSQL + authorization-service (único serviço pronto).
# Os demais serviços serão adicionados após definição de stack — ver TODO abaixo.

services:

  postgres:
    image: postgres:16-alpine
    container_name: hu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hu_db
      POSTGRES_USER: hu_user
      POSTGRES_PASSWORD: hu_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hu_user -d hu_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: hu-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/hu_db
      KC_DB_USERNAME: hu_user
      KC_DB_PASSWORD: hu_password
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    depends_on:
      postgres:
        condition: service_healthy

  authorization-service:
    build:
      context: ./services/authorization-service
      dockerfile: Dockerfile
    container_name: hu-auth-service
    restart: unless-stopped
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/hu_db
      QUARKUS_DATASOURCE_USERNAME: hu_user
      QUARKUS_DATASOURCE_PASSWORD: hu_password
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8180/realms/hu
      QUARKUS_OIDC_CLIENT_ID: authorization-service
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # TODO: adicionar api-gateway após definição de stack
  # api-gateway:
  #   build: ./services/api-gateway
  #   ...

  # TODO: adicionar patient-data-service após definição de stack
  # patient-data-service:
  #   build: ./services/patient-data-service
  #   ...

  # TODO: adicionar data-transform-service após definição de stack
  # data-transform-service:
  #   build: ./services/data-transform-service
  #   ...

  # TODO: adicionar frontend após definição de stack
  # frontend:
  #   build: ./frontend
  #   ...

volumes:
  postgres_data:
