services:

  postgres:
    image: postgres:17-alpine
    container_name: hu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hu_db
      POSTGRES_USER: hu_user
      POSTGRES_PASSWORD: hu_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hu_user -d hu_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: hu-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/hu_db
      KC_DB_USERNAME: hu_user
      KC_DB_PASSWORD: hu_password
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    depends_on:
      postgres:
        condition: service_healthy

  authorization-service:
    build:
      context: ./services/authorization-service
      dockerfile: Dockerfile
    container_name: hu-auth-service
    restart: unless-stopped
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/hu_db
      QUARKUS_DATASOURCE_USERNAME: hu_user
      QUARKUS_DATASOURCE_PASSWORD: hu_password
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8180/realms/hu
      QUARKUS_OIDC_CLIENT_ID: authorization-service
      MP_JWT_VERIFY_ISSUER: http://localhost:8180/realms/hu
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  patient-data-service:
    build:
      context: .
      dockerfile: ./services/patient-data-service/Dockerfile
    container_name: hu-patient-data-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://hu_user:hu_password@postgres:5432/hu_db
      GRPC_PORT: "50052"
      HEALTH_PORT: "8082"
    ports:
      - "50052:50052"
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  data-transform-service:
    build:
      context: .
      dockerfile: ./services/data-transform-service/Dockerfile
    container_name: hu-data-transform-service
    restart: unless-stopped
    environment:
      PATIENT_DATA_SERVICE_URL: patient-data-service:50052
      GRPC_PORT: "50053"
      HEALTH_PORT: "8083"
    ports:
      - "50053:50053"
      - "8083:8083"
    depends_on:
      patient-data-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    container_name: hu-api-gateway
    restart: unless-stopped
    environment:
      GATEWAY_LISTEN_ADDR: ":8000"
      AUTH_SERVICE_ADDR: authorization-service:8080
      PATIENT_DATA_SERVICE_ADDR: patient-data-service:50052
      DATA_TRANSFORM_SERVICE_ADDR: data-transform-service:50053
      OIDC_ISSUER_URL: http://keycloak:8180/realms/hu
      OIDC_PUBLIC_ISSUER_URL: http://localhost:8180/realms/hu
      RATE_LIMIT_RPS: "500"
      RATE_LIMIT_BURST: "1000"
    ports:
      - "8000:8000"
    depends_on:
      keycloak:
        condition: service_started
      authorization-service:
        condition: service_healthy
      patient-data-service:
        condition: service_healthy
      data-transform-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/gateway", "-health-check"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_AUTH_MODE: keycloak
        VITE_ENABLE_MOCKS: "false"
        VITE_KEYCLOAK_URL: http://localhost:8180
        VITE_KEYCLOAK_REALM: hu
        VITE_KEYCLOAK_CLIENT_ID: hu-frontend
    container_name: hu-frontend
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
