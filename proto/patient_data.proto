syntax = "proto3";

package hu.patientdata.v1;

message PatientRecord {
  string patient_id = 1;
  string full_name  = 2;
  string birth_date = 3;
  string gender     = 4;
  string city       = 5;
  string state      = 6;
  string cpf        = 7;
  string cns        = 8;
}

message EncounterRecord {
  string encounter_id = 1;
  string patient_id   = 2;
  string start_date   = 3;
  string end_date     = 4;
  string type         = 5;
  string department   = 6;
}

message ClinicalEventRecord {
  string event_id     = 1;
  string patient_id   = 2;
  string encounter_id = 3;
  string event_type   = 4;
  string event_code   = 5;
  string description  = 6;
  string event_date   = 7;
  string value        = 8;
  string unit         = 9;
}

message GetPatientRequest {
  string patient_id = 1;
}

message ListEncountersRequest {
  string patient_id = 1;
}

message ListEncountersResponse {
  repeated EncounterRecord encounters = 1;
}

message GetClinicalEventsRequest {
  string patient_id = 1;
  string event_type = 2;
}

message ListClinicalEventsResponse {
  repeated ClinicalEventRecord events = 1;
}

message GetPatientsByCarerRequest {
  string username   = 1;
  string carer_type = 2;
}

message PatientListResponse {
  repeated PatientRecord patients = 1;
}

message GetCohortRawRequest {
  string clinical_condition = 1;
}

message CohortRawResponse {
  repeated PatientRecord       patients = 1;
  repeated ClinicalEventRecord events   = 2;
}

message GetClinicalSummaryRequest {
  string patient_id = 1;
}

message ClinicalSummaryRecord {
  PatientRecord                patient           = 1;
  repeated EncounterRecord     recent_encounters = 2;
  repeated ClinicalEventRecord diagnoses         = 3;
  repeated ClinicalEventRecord exams             = 4;
  repeated ClinicalEventRecord medications       = 5;
}

service PatientDataService {
  rpc GetPatient(GetPatientRequest)                returns (PatientRecord);
  rpc ListEncounters(ListEncountersRequest)         returns (ListEncountersResponse);
  rpc GetClinicalEvents(GetClinicalEventsRequest)   returns (ListClinicalEventsResponse);
  rpc GetPatientsByCarer(GetPatientsByCarerRequest) returns (PatientListResponse);
  rpc GetCohortRaw(GetCohortRawRequest)             returns (CohortRawResponse);
  rpc GetClinicalSummary(GetClinicalSummaryRequest) returns (ClinicalSummaryRecord);
}
